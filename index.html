<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scanner Engine</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; }
        #reader { width: 100vw; height: 100vh; }
        /* Hide all html5-qrcode UI elements we don't need */
        #reader__dashboard, #reader__status_span { display: none !important; }
        video { object-fit: cover !important; }
    </style>
</head>
<body>
    <div id="reader"></div>
    <script>
        let scannerMode = "IN";
        let html5QrCode;

        function setMode(mode) { scannerMode = mode; }

        function handleManualScan(text) { if(text) onScanSuccess(text); }

        function startScanner() {
            html5QrCode = new Html5Qrcode("reader");
            html5QrCode.start(
                { facingMode: "environment" }, 
                { fps: 20, qrbox: (w, h) => { return { width: w * 0.8, height: h * 0.4 } } },
                onScanSuccess
            ).catch(err => console.error(err));
        }

        async function onScanSuccess(decodedText) {
            const entry = {
                qrContent: decodedText,
                status: scannerMode,
                userId: "App_User",
                time: new Date().toLocaleString()
            };
            
            // This sends the data to your Google Sheet
            const url = localStorage.getItem('api_url');
            if(url) {
                fetch(url, { method: 'POST', mode: 'no-cors', body: JSON.stringify(entry) });
            }

            // Pause briefly to show it worked
            await html5QrCode.pause();
            setTimeout(() => { html5QrCode.resume(); }, 2000);
        }

        window.onload = startScanner;
    </script>
</body>
</html>
