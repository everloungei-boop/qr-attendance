<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Attendance Pro Fixed</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --neon-blue: #00f2ff; --bg-dark: #0d1117; --card: #161b22; --border: #30363d; }
        body { margin: 0; font-family: -apple-system, sans-serif; background: var(--bg-dark); color: white; overflow: hidden; }
        
        /* Fixed Header - Prevents camera overlap */
        header { height: 60px; background: var(--card); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; box-sizing: border-box; }
        .logo { font-weight: bold; color: var(--neon-blue); letter-spacing: 1px; }

        /* Scanner Area - Not Fullscreen */
        #scan-container { width: 100%; height: 300px; background: #000; border-bottom: 1px solid var(--border); overflow: hidden; position: relative; }
        #reader { width: 100%; height: 100%; }

        /* Green Flash Feedback */
        #flash { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(57, 211, 83, 0.6); opacity: 0; z-index: 10; pointer-events: none; transition: opacity 0.2s; }

        /* Manual Input Section */
        #manual-box { padding: 15px; background: var(--bg-dark); }
        .input-group { display: flex; gap: 10px; }
        input { flex: 1; background: #010409; border: 1px solid var(--border); border-radius: 6px; padding: 12px; color: white; }
        .btn-send { background: var(--neon-blue); color: #000; border: none; border-radius: 6px; padding: 0 15px; font-weight: bold; }

        /* Pages */
        .page { position: fixed; top: 60px; left: 0; width: 100%; height: calc(100% - 130px); background: var(--bg-dark); z-index: 100; padding: 20px; box-sizing: border-box; overflow-y: auto; display: none; }
        .page.active { display: block; }

        /* Bottom Nav */
        nav { position: fixed; bottom: 0; width: 100%; height: 70px; background: var(--card); border-top: 1px solid var(--border); display: flex; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #8b949e; font-size: 0.7rem; text-decoration: none; }
        .nav-item.active { color: var(--neon-blue); }
        .nav-icon { font-size: 1.4rem; margin-bottom: 2px; }

        /* List Styling */
        .row { background: var(--card); padding: 12px; border-radius: 8px; margin-bottom: 10px; border: 1px solid var(--border); display: flex; justify-content: space-between; }
        .share-btn { width: 100%; background: #238636; color: white; border: none; padding: 15px; border-radius: 8px; font-weight: bold; margin-bottom: 20px; }
    </style>
</head>
<body>

<header>
    <div class="logo">ATTENDANCE_PRO</div>
    <div style="font-size: 0.8rem;">LOGS: <span id="count">0</span></div>
</header>

<!-- SCAN TAB CONTENT -->
<div id="scan-tab">
    <div id="scan-container">
        <div id="flash"></div>
        <div id="reader"></div>
    </div>
    <div id="manual-box">
        <label style="font-size: 0.7rem; color: var(--neon-blue); display: block; margin-bottom: 5px;">MANUAL DATA ENTRY</label>
        <div class="input-group">
            <input type="text" id="manualInput" placeholder="Enter barcode or name...">
            <button class="btn-send" onclick="submitManual()">SEND</button>
        </div>
    </div>
</div>

<!-- HISTORY TAB -->
<div id="history-page" class="page">
    <button class="share-btn" onclick="shareLogs()">📤 SHARE LOGS (WHATSAPP/ETC)</button>
    <div id="historyList"></div>
</div>

<!-- SETTINGS TAB -->
<div id="settings-page" class="page">
    <h3>CONFIG</h3>
    <label>Your Name</label>
    <input type="text" id="userName" onchange="save()" style="width:100%; margin-bottom:15px;">
    <label>Your ID</label>
    <input type="text" id="userId" onchange="save()" style="width:100%; margin-bottom:15px;">
    <label>Apps Script URL</label>
    <input type="text" id="apiURL" onchange="save()" style="width:100%; margin-bottom:15px;">
    <button onclick="localStorage.clear(); location.reload();" style="color:red; background:none; border:1px solid red; padding:5px; border-radius:4px;">Clear All Data</button>
</div>

<nav>
    <div class="nav-item active" onclick="nav('scan', this)">
        <span class="nav-icon">⌖</span><span>SCAN</span>
    </div>
    <div class="nav-item" onclick="nav('history', this)">
        <span class="nav-icon">▤</span><span>LOGS</span>
    </div>
    <div class="nav-item" onclick="nav('settings', this)">
        <span class="nav-icon">⚙</span><span>SET</span>
    </div>
</nav>

<script>
    let currentMode = "IN";
    let html5QrCode = null;
    let logs = JSON.parse(localStorage.getItem('logs') || '[]');

    function nav(tab, el) {
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
        
        // Hide all
        document.getElementById('scan-tab').style.display = 'none';
        document.getElementById('history-page').style.display = 'none';
        document.getElementById('settings-page').style.display = 'none';

        if(tab === 'scan') {
            document.getElementById('scan-tab').style.display = 'block';
            startScanner();
        } else {
            stopScanner();
            document.getElementById(tab + '-page').style.display = 'block';
            if(tab === 'history') updateList();
        }
    }

    function startScanner() {
        if(html5QrCode) return;
        html5QrCode = new Html5Qrcode("reader");
        html5QrCode.start({ facingMode: "environment" }, { fps: 20, qrbox: 200 }, onScanSuccess);
    }

    function stopScanner() {
        if(html5QrCode) {
            html5QrCode.stop().then(() => html5QrCode = null);
        }
    }

    function submitManual() {
        const val = document.getElementById('manualInput').value;
        if(val) {
            onScanSuccess(val);
            document.getElementById('manualInput').value = "";
        }
    }

    function onScanSuccess(text) {
        // Green Flash
        const f = document.getElementById('flash');
        f.style.opacity = '1';
        setTimeout(() => f.style.opacity = '0', 300);

        const name = localStorage.getItem('user_name') || "User";
        const id = localStorage.getItem('user_id') || "000";
        
        const entry = {
            qr: text,
            status: currentMode,
            by: `${name} (${id})`,
            time: new Date().toLocaleString()
        };

        logs.unshift(entry);
        localStorage.setItem('logs', JSON.stringify(logs));
        document.getElementById('count').innerText = logs.length;

        // API Call
        const url = localStorage.getItem('api_url');
        if(url) {
            const fd = new URLSearchParams();
            fd.append('qrContent', entry.qr);
            fd.append('status', entry.status);
            fd.append('scannedBy', entry.by);
            fd.append('time', entry.time);
            fetch(url, { method: 'POST', mode: 'no-cors', body: fd.toString() });
        }

        if(html5QrCode && html5QrCode.getState() === 2) {
            html5QrCode.pause();
            setTimeout(() => html5QrCode.resume(), 2000);
        }
    }

    async function shareLogs() {
        if (logs.length === 0) return alert("Empty");
        let csv = "QR Content,Timestamp,Status,User ID\n";
        logs.forEach(l => csv += `"${l.qr}","${l.time}","${l.status}","${l.by}"\n`);
        const file = new File([csv], 'logs.csv', { type: 'text/csv' });
        if (navigator.canShare && navigator.canShare({ files: [file] })) {
            await navigator.share({ files: [file], title: 'Attendance' });
        } else { alert("Sharing not supported"); }
    }

    function updateList() {
        const container = document.getElementById('historyList');
        container.innerHTML = logs.map(l => `
            <div class="row">
                <div><strong>${l.qr}</strong><br><small>${l.time}</small></div>
                <div style="color:${l.status==='IN'?'#39d353':'#f85149'}"><b>${l.status}</b></div>
            </div>
        `).join('');
    }

    function save() {
        localStorage.setItem('user_name', document.getElementById('userName').value);
        localStorage.setItem('user_id', document.getElementById('userId').value);
        localStorage.setItem('api_url', document.getElementById('apiURL').value);
    }

    window.onload = () => {
        document.getElementById('userName').value = localStorage.getItem('user_name') || "";
        document.getElementById('userId').value = localStorage.getItem('user_id') || "";
        document.getElementById('apiURL').value = localStorage.getItem('api_url') || "";
        document.getElementById('count').innerText = logs.length;
        startScanner();
    };
</script>
</body>
</html>
