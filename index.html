<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Attendance Pro Fixed</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --neon: #00f2ff; --bg: #0d1117; --card: #161b22; --border: #30363d; }
        body { margin: 0; font-family: sans-serif; background: var(--bg); color: white; overflow: hidden; height: 100vh; }
        
        header { height: 50px; background: var(--card); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; box-sizing: border-box; }
        
        /* Fixed height for scanner area to leave room for manual input */
        #scan-area { width: 100%; height: 240px; background: #000; position: relative; border-bottom: 1px solid var(--border); }
        #reader { width: 100%; height: 100%; }
        #flash-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(57, 211, 83, 0.4); opacity: 0; z-index: 10; pointer-events: none; }

        /* Manual box is now strictly positioned to avoid the bottom overlap */
        #manual-section { padding: 12px; background: var(--bg); }
        .input-row { display: flex; gap: 8px; margin-top: 4px; }
        input { flex: 1; background: #010409; border: 1px solid var(--border); border-radius: 8px; padding: 12px; color: white; font-size: 1rem; }
        .btn-send { background: var(--neon); color: #000; border: none; border-radius: 8px; padding: 0 18px; font-weight: bold; }

        /* Navigation */
        nav { position: fixed; bottom: 0; width: 100%; height: 60px; background: var(--card); border-top: 1px solid var(--border); display: flex; z-index: 1000; padding-bottom: env(safe-area-inset-bottom); }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #8b949e; font-size: 0.7rem; }
        .nav-item.active { color: var(--neon); }

        /* Page content area */
        .page-container { height: calc(100vh - 110px); overflow-y: auto; }
        .page { padding: 15px; display: none; }
        .page.active { display: block; }
    </style>
</head>
<body>

<header>
    <div style="font-weight:900; color:var(--neon)">CORE_SCAN</div>
    <div style="font-size: 0.7rem;">LOGS: <span id="logCount">0</span></div>
</header>

<div class="page-container">
    <!-- SCANNER TAB -->
    <div id="scan-tab" class="page active">
        <div id="scan-area">
            <div id="flash-overlay"></div>
            <div id="reader"></div>
        </div>
        <div id="manual-section">
            <label style="color: var(--neon); font-size: 0.7rem; font-weight: bold;">MANUAL ENCODING</label>
            <div class="input-row">
                <input type="text" id="manualText" placeholder="Enter data...">
                <button class="btn-send" onclick="handleManual()">SEND</button>
            </div>
        </div>
    </div>

    <!-- RECORDS TAB -->
    <div id="history-tab" class="page">
        <button onclick="shareLogs()" style="width:100%; background:#238636; color:white; border:none; padding:15px; border-radius:8px; font-weight:bold; margin-bottom:15px;">📤 SHARE RECORDS</button>
        <div id="historyContent"></div>
    </div>

    <!-- SETTINGS TAB -->
    <div id="settings-tab" class="page">
        <h3 style="color:var(--neon)">SETTINGS</h3>
        <label>Operator Name</label>
        <input type="text" id="prefName" onchange="savePrefs()" style="width:100%; margin-bottom:15px;">
        <label>Operator ID</label>
        <input type="text" id="prefId" onchange="savePrefs()" style="width:100%; margin-bottom:15px;">
        <label>Script URL</label>
        <input type="text" id="prefUrl" onchange="savePrefs()" style="width:100%; margin-bottom:15px;">
    </div>
</div>

<nav>
    <div class="nav-item active" onclick="switchTab('scan', this)"><span>⌖ SCANNER</span></div>
    <div class="nav-item" onclick="switchTab('history', this)"><span>▤ RECORDS</span></div>
    <div class="nav-item" onclick="switchTab('settings', this)"><span>⚙ SETTINGS</span></div>
</nav>

<script>
    let currentMode = "IN";
    let qrEngine = null;
    let localLogs = JSON.parse(localStorage.getItem('attendance_logs') || '[]');

    function switchTab(target, el) {
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
        
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(target + '-tab').classList.add('active');

        if(target === 'scan') {
            initCamera();
            // Tell Android to SHOW buttons
            if(window.Android) window.Android.toggleButtons(true);
        } else {
            killCamera();
            // Tell Android to HIDE buttons
            if(window.Android) window.Android.toggleButtons(false);
            if(target === 'history') renderLogs();
        }
    }

    function initCamera() {
        if(qrEngine) return;
        qrEngine = new Html5Qrcode("reader");
        qrEngine.start({ facingMode: "environment" }, { fps: 15, qrbox: {width: 250, height: 150} }, processResult);
    }

    function killCamera() { if(qrEngine) qrEngine.stop().then(() => qrEngine = null); }

    function handleManual() {
        const txt = document.getElementById('manualText').value;
        if(txt) { processResult(txt); document.getElementById('manualText').value = ""; }
    }

    function processResult(text) {
        const flash = document.getElementById('flash-overlay');
        flash.style.opacity = '1'; setTimeout(() => flash.style.opacity = '0', 300);

        const name = localStorage.getItem('u_name') || "User";
        const id = localStorage.getItem('u_id') || "0";
        const data = { qr: text, status: currentMode, user: `${name} (${id})`, time: new Date().toLocaleString() };

        localLogs.unshift(data);
        localStorage.setItem('attendance_logs', JSON.stringify(localLogs));
        document.getElementById('logCount').innerText = localLogs.length;

        const endpoint = localStorage.getItem('u_url');
        if(endpoint) {
            const body = new URLSearchParams();
            body.append('qrContent', data.qr);
            body.append('status', data.status);
            body.append('scannedBy', data.user);
            body.append('time', data.time);
            fetch(endpoint, { method: 'POST', mode: 'no-cors', body: body.toString() });
        }
    }

    function renderLogs() {
        document.getElementById('historyContent').innerHTML = localLogs.map(l => `
            <div style="background:var(--card); padding:10px; border-radius:8px; margin-bottom:8px; display:flex; justify-content:space-between; border:1px solid var(--border)">
                <div><strong>${l.qr}</strong><br><small>${l.time}</small></div>
                <div style="color:${l.status==='IN'?'#39d353':'#f85149'}"><b>${l.status}</b></div>
            </div>`).join('');
    }

    function savePrefs() {
        localStorage.setItem('u_name', document.getElementById('prefName').value);
        localStorage.setItem('u_id', document.getElementById('prefId').value);
        localStorage.setItem('u_url', document.getElementById('prefUrl').value);
    }

    window.onload = () => {
        document.getElementById('prefName').value = localStorage.getItem('u_name') || "";
        document.getElementById('prefId').value = localStorage.getItem('u_id') || "";
        document.getElementById('prefUrl').value = localStorage.getItem('u_url') || "";
        document.getElementById('logCount').innerText = localLogs.length;
        initCamera();
    };
</script>
</body>
</html>
