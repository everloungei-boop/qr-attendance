<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Attendance Pro Dark</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon-blue: #00f2ff; --bg-dark: #0a0e14; --card-dark: #161b22; --text-gray: #8b949e; }
        body { margin: 0; font-family: 'Rajdhani', sans-serif; background: var(--bg-dark); color: white; overflow: hidden; }
        
        /* Scanner Viewport */
        #scan-container { position: fixed; top: 0; left: 0; width: 100%; height: calc(100% - 70px); z-index: 1; background: #000; }
        #reader { width: 100%; height: 100%; }

        /* Floating Neon Header */
        header { position: fixed; top: 0; width: 100%; padding: 15px; background: rgba(10, 14, 20, 0.8); backdrop-filter: blur(10px); z-index: 100; border-bottom: 1px solid #30363d; display: flex; justify-content: space-between; align-items: center; box-sizing: border-box; }
        .logo { font-family: 'Orbitron', sans-serif; font-weight: 700; color: var(--neon-blue); letter-spacing: 2px; }
        .session-tag { background: #238636; padding: 4px 10px; border-radius: 4px; font-size: 0.8rem; font-weight: bold; }

        /* Navigation Bar */
        nav { position: fixed; bottom: 0; width: 100%; height: 70px; background: var(--card-dark); display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #30363d; z-index: 1000; }
        .nav-item { color: var(--text-gray); text-decoration: none; display: flex; flex-direction: column; align-items: center; font-size: 0.7rem; transition: 0.3s; width: 33%; }
        .nav-item.active { color: var(--neon-blue); text-shadow: 0 0 10px var(--neon-blue); }
        .nav-icon { font-size: 1.5rem; margin-bottom: 2px; }

        /* Content Pages */
        .page { position: fixed; top: 60px; left: 0; width: 100%; height: calc(100% - 130px); background: var(--bg-dark); z-index: 50; padding: 20px; box-sizing: border-box; overflow-y: auto; display: none; }
        .page.active { display: block; }

        /* Components */
        .neon-card { background: var(--card-dark); border-radius: 12px; padding: 20px; margin-bottom: 15px; border: 1px solid #30363d; }
        label { color: var(--neon-blue); font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; display: block; margin-bottom: 8px; }
        input { width: 100%; background: #010409; border: 1px solid #30363d; border-radius: 8px; padding: 12px; color: white; margin-bottom: 15px; box-sizing: border-box; }
        .share-btn { width: 100%; background: var(--neon-blue); color: black; border: none; padding: 15px; border-radius: 8px; font-weight: bold; font-family: 'Orbitron'; cursor: pointer; }
        
        .history-row { display: flex; justify-content: space-between; border-bottom: 1px solid #30363d; padding: 12px 0; font-size: 0.9rem; }
        .status-badge { font-weight: bold; padding: 2px 6px; border-radius: 3px; font-size: 0.7rem; }
        .IN { color: #39d353; }
        .OUT { color: #f85149; }
    </style>
</head>
<body>

<header>
    <div class="logo">QUANTUM_SCAN</div>
    <div class="session-tag">SCAN: <span id="count">0</span></div>
</header>

<div id="scan-container"><div id="reader"></div></div>

<div id="history-page" class="page">
    <button class="share-btn" onclick="shareLogs()">SHARE TO WHATSAPP/MESSENGER</button>
    <div style="margin-top:20px;"></div>
    <div id="historyList"></div>
</div>

<div id="settings-page" class="page">
    <div class="neon-card">
        <label>Operator Name</label>
        <input type="text" id="userName" onchange="save()">
        <label>Operator ID</label>
        <input type="text" id="userId" onchange="save()">
    </div>
    <div class="neon-card">
        <label>Database Endpoint</label>
        <input type="text" id="apiURL" onchange="save()" placeholder="Google App Script URL">
    </div>
    <button style="background:#f85149; color:white; width:100%; padding:10px; border:none; border-radius:8px;" onclick="reset()">RESET CACHE</button>
</div>

<nav>
    <div class="nav-item active" onclick="nav('scan', this)">
        <span class="nav-icon">⌖</span><span>SCAN</span>
    </div>
    <div class="nav-item" onclick="nav('history', this)">
        <span class="nav-icon">▤</span><span>LOGS</span>
    </div>
    <div class="nav-item" onclick="nav('settings', this)">
        <span class="nav-icon">⚙</span><span>SET</span>
    </div>
</nav>

<script>
    let currentMode = "IN";
    let html5QrCode = null;
    let logs = JSON.parse(localStorage.getItem('logs') || '[]');

    function nav(page, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        el.classList.add('active');

        if(page === 'scan') {
            document.getElementById('scan-container').style.display = 'block';
            startScanner();
        } else {
            document.getElementById('scan-container').style.display = 'none';
            stopScanner();
            document.getElementById(page + '-page').classList.add('active');
            if(page === 'history') updateList();
        }
    }

    function startScanner() {
        if(html5QrCode) return;
        html5QrCode = new Html5Qrcode("reader");
        html5QrCode.start({ facingMode: "environment" }, { fps: 25, qrbox: 250 }, onScan);
    }

    function stopScanner() {
        if(html5QrCode) {
            html5QrCode.stop().then(() => html5QrCode = null);
        }
    }

    function onScan(text) {
        const name = localStorage.getItem('user_name') || "User";
        const id = localStorage.getItem('user_id') || "000";
        const entry = { 
            qr: text, 
            status: currentMode, 
            by: `${name} (${id})`, 
            time: new Date().toLocaleString() 
        };
        
        logs.unshift(entry);
        localStorage.setItem('logs', JSON.stringify(logs));
        document.getElementById('count').innerText = logs.length;

        // API POST
        const url = localStorage.getItem('api_url');
        if(url) {
            const fd = new URLSearchParams();
            fd.append('qrContent', entry.qr);
            fd.append('status', entry.status);
            fd.append('scannedBy', entry.by);
            fd.append('time', entry.time);
            fetch(url, { method: 'POST', mode: 'no-cors', body: fd.toString() });
        }
        
        // Pause briefly
        html5QrCode.pause();
        setTimeout(() => html5QrCode.resume(), 1500);
    }

    async function shareLogs() {
        if (logs.length === 0) return alert("No data to share");
        let csv = "QR,Timestamp,Status,User\n";
        logs.forEach(l => csv += `"${l.qr}","${l.time}","${l.status}","${l.by}"\n`);
        
        const file = new File([csv], `Attendance_${new Date().getTime()}.csv`, { type: 'text/csv' });
        
        if (navigator.canShare && navigator.canShare({ files: [file] })) {
            try {
                await navigator.share({
                    files: [file],
                    title: 'Attendance Logs',
                    text: 'Exported Attendance CSV'
                });
            } catch (err) { console.error("Share failed", err); }
        } else {
            alert("Sharing not supported on this browser version.");
        }
    }

    function updateList() {
        const container = document.getElementById('historyList');
        container.innerHTML = logs.map(l => `
            <div class="history-row">
                <div><strong>${l.qr}</strong><br><small style="color:#8b949e">${l.time}</small></div>
                <div class="status-badge ${l.status}">${l.status}</div>
            </div>
        `).join('');
    }

    function save() {
        localStorage.setItem('user_name', document.getElementById('userName').value);
        localStorage.setItem('user_id', document.getElementById('userId').value);
        localStorage.setItem('api_url', document.getElementById('apiURL').value);
    }

    function reset() { if(confirm("Wipe logs?")) { localStorage.clear(); location.reload(); } }

    window.onload = () => {
        document.getElementById('userName').value = localStorage.getItem('user_name') || "";
        document.getElementById('userId').value = localStorage.getItem('user_id') || "";
        document.getElementById('apiURL').value = localStorage.getItem('api_url') || "";
        document.getElementById('count').innerText = logs.length;
        startScanner();
    };
</script>
</body>
</html>
